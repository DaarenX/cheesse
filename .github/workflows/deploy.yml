name: Deploy build artifacts

on:
  push:
    branches: [ "main" ]

jobs:
  linux:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build
        run: ./gradlew build packageUberJarForCurrentOS

      - name: Upload android apk
        uses: actions/upload-artifact@v7
        with:
          path: androidApp/build/outputs/apk/release/androidApp-release-unsigned.apk
          archive: false

      - name: Upload server jar
        uses: actions/upload-artifact@v7
        with:
          path: server/build/libs/server-?.?.?.jar
          archive: false

      - name: Upload linux jar
        uses: actions/upload-artifact@v7
        with:
          path: composeApp/build/compose/jars/*.jar
          archive: false

      - name: Setup Github Pages
        uses: actions/configure-pages@v6

      - name: Upload wasm page
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'composeApp/build/dist/wasmJs/productionExecutable'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build macOS desktop app
        run: ./gradlew packageUberJarForCurrentOS

      - name: Upload macOS jar
        uses: actions/upload-artifact@v7
        with:
          path: composeApp/build/compose/jars/*.jar
          archive: false

      - name: Build iOS App
        run: |
          xcodebuild -project iosApp/iosApp.xcodeproj \
                     -scheme iosApp \
                     -sdk iphonesimulator \
                     -configuration Debug \
                     -derivedDataPath build-ios \
                     build \
                     CODE_SIGNING_ALLOWED=NO

      - name: Upload iOS App
        uses: actions/upload-artifact@v7
        with:
          name: Cheesse-ios.app
          path: build-ios/Build/Products/Debug-iphonesimulator/Cheesse.app

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build Windows Desktop App
        run: ./gradlew packageUberJarForCurrentOS

      - name: Upload Windows Desktop Jar
        uses: actions/upload-artifact@v7
        with:
          path: composeApp/build/compose/jars/*.jar
          archive: false

